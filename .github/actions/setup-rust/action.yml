name: Set up Rust
description: >
  Install the Rust toolchain (optionally with rustup components and the C build
  dependencies) and optionally restore the shared cargo build cache.

inputs:
  rust-version:
    description: Rust toolchain version to install
    required: true
  components:
    description: Space-separated rustup components to install (e.g. "rustfmt clippy")
    required: false
    default: ""
  system-deps:
    description: Install the C build dependencies (build-essential clang cmake libssl-dev pkg-config)
    required: false
    default: "false"
  cache:
    description: Restore/save the ~/.cargo and target/ build cache
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install system dependencies
      if: inputs.system-deps == 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang cmake libssl-dev pkg-config
    - name: Install Rust
      shell: bash
      run: |
        # rustup-init takes one value per --component flag, so repeat it for each.
        comp_flag=""
        for c in $INPUT_COMPONENTS; do
          comp_flag="$comp_flag --component $c"
        done
        curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain "$INPUT_RUST_VERSION" -y $comp_flag
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      env:
        INPUT_RUST_VERSION: ${{ inputs.rust-version }}
        INPUT_COMPONENTS: ${{ inputs.components }}
    - name: Restore cargo build cache
      if: inputs.cache == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          ~/.cargo/registry/
          ~/.cargo/git/
          target/
        # Scoped per job because callers build with different features/RUSTFLAGS
        # (e.g. rust-checks' --all-features vs test-unit's coverage build), so they
        # must not share a target/ cache. os + toolchain keep it correct across bumps.
        # restore-keys let a changed Cargo.lock reuse the newest prior cache as a base
        # (partial hit) instead of a full miss; the last, job-agnostic key still lets
        # any job seed the downloaded-crate registry/git cache.
        key: cargo-${{ runner.os }}-${{ inputs.rust-version }}-${{ github.job }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-${{ inputs.rust-version }}-${{ github.job }}-
          cargo-${{ runner.os }}-${{ inputs.rust-version }}-
