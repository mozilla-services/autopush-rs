# Reusable workflow invoked by build-test-deploy.yml after check-and-test
# succeeds. Builds the test/cron images and pushes them to the autopush GAR via
# the shared mozilla/deploy-actions build-and-push reusable. The caller sets
# `push`: false on PRs (build-only Dockerfile validation), true on release.
name: Publish test images

on:
  workflow_call:
    inputs:
      push:
        description: Whether to push the built images (false = build-only validation)
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-and-push-test-images:
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: autopush-load-tests
            dockerfile_path: tests/load/Dockerfile
          - image_name: autopush-end-to-end-tests
            dockerfile_path: tests/notification/Dockerfile
          # The reusable has no build `target` input, but integration-tests is the
          # final stage of its Dockerfile, so the default target already builds it.
          - image_name: autopush-integration-tests
            dockerfile_path: tests/integration/Dockerfile
          - image_name: autopush-reliability-cron
            dockerfile_path: scripts/reliability/Dockerfile
            image_build_context: scripts/reliability
    uses: mozilla/deploy-actions/.github/workflows/build-and-push.yml@ef0f037316873ff408a598f1cd98876dd7851e53 # main (push input, pre-release)
    with:
      image_name: ${{ matrix.image_name }}
      gar_name: autopush-prod
      project_id: moz-fx-autopush-prod
      dockerfile_path: ${{ matrix.dockerfile_path }}
      image_build_context: ${{ matrix.image_build_context || './' }}
      should_tag_latest: true
      push: ${{ inputs.push }}
