name: Build, Tag and Push Container Images to GAR Repository

on:
  # Reusable workflow. The caller (build-test-deploy.yml) owns invocation and sets
  # `push`: false on PRs (build-only Dockerfile validation), true on release.
  workflow_call:
    inputs:
      push:
        description: Whether to push the built images (false = build-only validation)
        type: boolean
        default: true
      should_tag_latest:
        description: >
          Tag the images `:latest`. True for releases (dev/ent-dev track :latest);
          MUST be false for preview so a PR image never clobbers the shared :latest.
        type: boolean
        default: true

jobs:
  build-and-push-autoconnect:
    permissions:
      contents: read
      id-token: write
    # TODO: Pin to release once it's available
    uses: mozilla/deploy-actions/.github/workflows/build-and-push.yml@ef0f037316873ff408a598f1cd98876dd7851e53 # main (push input, pre-release)
    with:
      push: ${{ inputs.push }}
      image_name: autoconnect
      gar_name: autopush-prod
      project_id: moz-fx-autopush-prod
      postbuild_script: "./scripts/smoketests/autoconnect.sh autoconnect"
      docker_build_args: |
        CRATE=autoconnect
        BINARY=autoconnect
      should_tag_latest: ${{ inputs.should_tag_latest }}

  build-and-push-autoendpoint:
    permissions:
      contents: read
      id-token: write
    # TODO: Pin to release once it's available
    uses: mozilla/deploy-actions/.github/workflows/build-and-push.yml@ef0f037316873ff408a598f1cd98876dd7851e53 # main (push input, pre-release)
    with:
      push: ${{ inputs.push }}
      image_name: autoendpoint
      gar_name: autopush-prod
      project_id: moz-fx-autopush-prod
      postbuild_script: "./scripts/smoketests/autoendpoint.sh autoendpoint"
      docker_build_args: |
        CRATE=autoendpoint
        BINARY=autoendpoint
      should_tag_latest: ${{ inputs.should_tag_latest }}

  # Kept inline rather than using the shared mozilla/deploy-actions reusable on
  # purpose. The fx-enterprise tenant auto-deploys these images by matching
  # `image_regex: ^\d+\.\d+\.\d+_enterprise$` (global-platform-admin
  # tenants/fx-enterprise.yaml) and using `latest_enterprise` suffix.
  # The reusable can only append tag metadata as
  # `<tag>--enterprise` (double dash), which would not match that regex, so we
  # hand-roll the `_enterprise` tag scheme here. Unifying onto the reusable would
  # require changing the tenant's regex in lockstep.
  build-and-push-enterprise:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-build-and-push
        id: setup
        with:
          workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}
          gcp_service_account: "${{ vars.SERVICE_ACCOUNT_NAME || 'artifact-writer' }}@moz-fx-fx-enterprise-prod.iam.gserviceaccount.com"

      - name: Log in to Docker Hub
        uses: ./.github/actions/dockerhub-login
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute autoconnect tags
        run: |
          if [[ "${STEPS_SETUP_OUTPUTS_PUSH_LATEST}" == "true" ]]; then
            TAGS=$(cat <<EOF
          us-docker.pkg.dev/moz-fx-fx-enterprise-prod/fx-enterprise-private/autoconnect:${STEPS_SETUP_OUTPUTS_IMAGE_TAG}_enterprise
          us-docker.pkg.dev/moz-fx-fx-enterprise-prod/fx-enterprise-private/autoconnect:latest_enterprise
          EOF
          )
          else
            TAGS=$(cat <<EOF
          us-docker.pkg.dev/moz-fx-fx-enterprise-prod/fx-enterprise-private/autoconnect:${STEPS_SETUP_OUTPUTS_IMAGE_TAG}
          EOF
          )
          fi
          echo "IMAGE_TAGS<<EOF" >> "$GITHUB_ENV"
          echo "$TAGS" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        env:
          STEPS_SETUP_OUTPUTS_PUSH_LATEST: ${{ steps.setup.outputs.push_latest }}
          STEPS_SETUP_OUTPUTS_IMAGE_TAG: ${{ steps.setup.outputs.image_tag }}

      - name: Build and push autoconnect to enterprise GAR
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: ${{ inputs.push }}
          build-args: |
            CRATE=autoconnect
            BINARY=autoconnect
            BUILD_ARGS=--no-default-features --features=enterprise
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute autoendpoint tags
        run: |
          if [[ "${STEPS_SETUP_OUTPUTS_PUSH_LATEST}" == "true" ]]; then
            TAGS=$(cat <<EOF
          us-docker.pkg.dev/moz-fx-fx-enterprise-prod/fx-enterprise-private/autoendpoint:${STEPS_SETUP_OUTPUTS_IMAGE_TAG}_enterprise
          us-docker.pkg.dev/moz-fx-fx-enterprise-prod/fx-enterprise-private/autoendpoint:latest_enterprise
          EOF
          )
          else
            TAGS=$(cat <<EOF
          us-docker.pkg.dev/moz-fx-fx-enterprise-prod/fx-enterprise-private/autoendpoint:${STEPS_SETUP_OUTPUTS_IMAGE_TAG}
          EOF
          )
          fi
          echo "IMAGE_TAGS<<EOF" >> "$GITHUB_ENV"
          echo "$TAGS" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
        env:
          STEPS_SETUP_OUTPUTS_PUSH_LATEST: ${{ steps.setup.outputs.push_latest }}
          STEPS_SETUP_OUTPUTS_IMAGE_TAG: ${{ steps.setup.outputs.image_tag }}

      - name: Build and push autoendpoint to enterprise GAR
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: ${{ inputs.push }}
          build-args: |
            CRATE=autoendpoint
            BINARY=autoendpoint
            BUILD_ARGS=--no-default-features --features=enterprise
          tags: ${{ env.IMAGE_TAGS }}
          cache-from: type=gha
